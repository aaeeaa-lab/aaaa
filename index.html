<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f5f6fa;color:#222}
header{position:sticky;top:0;z-index:5;background:#ffffffee;backdrop-filter:blur(8px);border-bottom:1px solid #ddd;padding:14px 18px}
h1{font-size:20px;margin:0 0 10px}
.controls,.music-search-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select,button{font:inherit;padding:8px 10px;border:1px solid #cfd3dc;border-radius:8px;background:white}
button{cursor:pointer}
main{padding:16px 18px}
#count{font-size:13px;color:#666;margin:8px 0 14px}
.music-box{margin:10px 0;padding:10px;border:1px solid #e2e5ee;border-radius:12px;background:#fafbff}
.music-box h2{font-size:15px;margin:0 0 8px}
.music-search-row input{width:320px;max-width:50vw;min-width:160px;flex:0 0 auto}
.idol-columns{display:grid;grid-template-columns:repeat(3,minmax(330px,380px));justify-content:start;gap:18px;align-items:start}
.type-col{min-width:0}
.type-col h2{font-size:17px;margin:0 0 10px;padding:8px 10px;border-radius:10px;background:#fff;border:1px solid #e3e5ec}
.idol-list{display:flex;flex-direction:column;gap:10px}
.idol-card{background:#fff;border:1px solid #e2e5ee;border-radius:14px;padding:10px;min-width:0}
.idol-head{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:6px}
.idol-name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.idol-kana{font-size:12px;color:#777;font-weight:400;margin-left:6px}
.badge{font-size:12px;color:#555;background:#f1f3f8;border-radius:999px;padding:3px 8px;white-space:nowrap}
.cv{font-size:13px;color:#444;margin:4px 0 10px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin:0 0 10px}
.profile-row{display:grid;grid-template-columns:72px minmax(0,1fr);gap:6px;min-width:0}
.profile-label{font-size:12px;color:#666;white-space:nowrap}
.profile-value{font-size:13px;line-height:1.4;overflow-wrap:anywhere}
.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.links a{font-size:12px;text-decoration:none;border:1px solid #d6d8e0;border-radius:999px;padding:5px 8px;color:#333;background:#fff}
.links a:hover{background:#f1f3f8}
@media(max-width:1200px){.idol-columns{grid-template-columns:1fr}}
@media(max-width:620px){.profile-grid{grid-template-columns:1fr}.music-search-row input{min-width:0}}

/* v27 compact collapsible */
.idol-card{padding:0;overflow:hidden}
.idol-toggle{width:100%;border:0;background:#fff;padding:12px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.idol-toggle:hover{background:#f7f8fc}
.idol-toggle::after{content:'＋';color:#777;font-size:16px;line-height:1}
.idol-card.open .idol-toggle::after{content:'－'}
.idol-card .idol-body{display:none;padding:0 12px 12px}
.idol-card.open .idol-body{display:block}


/* v28 align type badge */
.idol-toggle{
  display:grid!important;
  grid-template-columns:minmax(0,1fr) 74px 18px;
  align-items:center;
  gap:8px;
}
.idol-toggle .idol-name{
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.idol-toggle .badge{
  justify-self:end;
  text-align:center;
  min-width:72px;
}
.idol-toggle::after{
  justify-self:end;
}


/* v30: profile search width matches music search */
.controls #q{
  width:320px;
  max-width:50vw;
  min-width:160px;
  flex:0 0 auto;
}

</style>
</head>

</header>

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function ytMusicUrl(query){return 'https://music.youtube.com/search?q='+encodeURIComponent(query.includes('Lantis')?query:query+' Lantis')}
function idolMusicQuery(x){return `${x.name}`}
function rowText(x){return `${Object.values(x).join(' ')} B${x.B}/W${x.W}/H${x.H} B${x.B} W${x.W} H${x.H}`.toLowerCase()}
function filtered(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const t=document.getElementById('type').value;
  return data.filter(x=>(!t||x.type===t)&&(!q||rowText(x).includes(q)));
}
function pair(label,value){return `<div class="profile-row"><div class="profile-label">${label}</div><div class="profile-value">${esc(value)}</div></div>`}
function card(x){
  return `<section class="idol-card">

    <div class="idol-body">
      <div class="cv">CV　${esc(x.cv)}</div>
      <div class="profile-grid">
        ${pair('年齢',x.age)}${pair('誕生日',x.birthday)}${pair('星座',x.sign)}${pair('血液型',x.blood)}
        ${pair('身長',x.height)}${pair('体重',x.weight)}${pair('B/W/H',`B${x.B}/W${x.W}/H${x.H}`)}${pair('利き手',x.hand)}
        ${pair('出身地',x.home)}${pair('趣味',x.hobby)}${pair('特技',x.skill)}${pair('好きなもの',x.like)}
      </div>
      <div class="links">
        <a href="${esc(x.url)}" target="_blank" rel="noopener">公式プロフィール</a>
        <a href="${ytMusicUrl(idolMusicQuery(x))}" target="_blank" rel="noopener">楽曲検索</a>
        <a href="${ytMusicUrl(x.name+' THE IDOLM@STER MILLION LIVE! Lantis')}" target="_blank" rel="noopener">公式関連検索</a>

    </div>
  </section>`
}

    <section class="type-col"><h2>Princess (${groups.Princess.length})</h2><div class="idol-list">${groups.Princess.map(card).join('')}</div></section>
    <section class="type-col"><h2>Fairy (${groups.Fairy.length})</h2><div class="idol-list">${groups.Fairy.map(card).join('')}</div></section>
    <section class="type-col"><h2>Angel (${groups.Angel.length})</h2><div class="idol-list">${groups.Angel.map(card).join('')}</div></section>
  </div>`;
}
function csv(){
  const head=['タイプ','名前','ふりがな','CV','年齢','誕生日','星座','血液型','身長','体重','B/W/H','利き手','出身地','趣味','特技','好きなもの'];
  const rows=filtered().map(x=>[x.type,x.name,x.kana,x.cv,x.age,x.birthday,x.sign,x.blood,x.height,x.weight,`B${x.B}/W${x.W}/H${x.H}`,x.hand,x.home,x.hobby,x.skill,x.like]);
  const body=[head,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+body],{type:'text/csv'}));a.download='millionlive_profiles.csv';a.click();
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('q').addEventListener('input',render);
  document.getElementById('type').addEventListener('change',render);
  document.getElementById('csv').addEventListener('click',csv);
  document.getElementById('musicBtn').addEventListener('click',()=>{const q=document.getElementById('musicQ').value.trim();if(q) window.open(ytMusicUrl((q.includes('曲')||q.includes('song'))?q:(q+' 曲 song')),'_blank','noopener')});
  document.getElementById('musicQ').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const q=e.currentTarget.value.trim();if(q) window.open(ytMusicUrl((q.includes('曲')||q.includes('song'))?q:(q+' 曲 song')),'_blank','noopener')}});
  render();
});
</script>
